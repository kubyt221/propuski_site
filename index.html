<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Учебная таблица</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<style>
body {font-family: Arial; background:#f4f4f4; padding:20px;}
h1 {text-align:center;}
table {width:100%; border-collapse:collapse; background:white;}
th,td {border:2px solid black; padding:10px; text-align:center;}
tr.done {background:#b6fcb6;}
tr.warning {background:#fff3a0;}
button {padding:10px; margin:5px; cursor:pointer;}
#adminPanel {display:none; background:#222; color:white; padding:15px;}
input,select {margin:5px; padding:5px;}
</style>
</head>

<body>

<h1>Контроль исправления пар</h1>

<table>
<thead>
<tr>
<th>Предмет</th>
<th>Условие</th>
<th>Исправлено</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<button onclick="toggleAdmin()">Админка</button>

<div id="adminPanel">
<select id="row"></select>
<input id="subject" placeholder="Предмет">
<input id="condition" placeholder="Условие">
<select id="status">
<option value="no">Нет</option>
<option value="yes">Да</option>
</select>
<select id="color">
<option value="">Нет</option>
<option value="warning">Жёлтый</option>
</select>
<br>
<button onclick="apply()">Применить</button>
<button onclick="save()">Сохранить</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAecbN_xzz7Dgr-_o6M_spZPVwxTjoq7qk",
  authDomain: "propuski-site.firebaseapp.com",
  projectId: "propuski-site",
  storageBucket: "propuski-site.firebasestorage.app",
  messagingSenderId: "194943275185",
  appId: "1:194943275185:web:a6958ec1d74efdd58d5290"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let data = [];
let logs = [];

async function load() {
    const snapshot = await db.collection("table").get();

    if(snapshot.empty) {
        data = [
        {subject:"Английский язык",condition:"",status:"no",color:""},
        {subject:"Информатика",condition:"",status:"no",color:""},
        {subject:"Физическая культура",condition:"",status:"no",color:""},
        {subject:"Биология",condition:"",status:"no",color:""},
        {subject:"Русский язык",condition:"",status:"no",color:""},
        {subject:"Литература",condition:"",status:"no",color:""},
        {subject:"Математика",condition:"",status:"no",color:""},
        {subject:"Физика",condition:"",status:"no",color:""},
        {subject:"История",condition:"",status:"no",color:""},
        {subject:"Обществознание",condition:"",status:"no",color:""},
        {subject:"ОБЗР",condition:"",status:"no",color:""},
        {subject:"География",condition:"",status:"no",color:""},
        {subject:"Химия",condition:"",status:"no",color:""},
        {subject:"Индивидуальный проект",condition:"",status:"no",color:""}
        ];
        render();
        return;
    }

    data = snapshot.docs.map(d=>d.data());
    render();
}

function render() {
    let tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    let sorted = [...data];

    sorted.sort((a,b)=>{
        if(a.color==="warning") return -1;
        if(b.color==="warning") return 1;
        if(a.status==="yes") return 1;
        if(b.status==="yes") return -1;
        return 0;
    });

    sorted.forEach((item)=>{
        let tr = document.createElement("tr");
        if(item.status==="yes") tr.classList.add("done");
        if(item.color==="warning") tr.classList.add("warning");

        tr.innerHTML = `
        <td>${item.subject}</td>
        <td>${item.condition}</td>
        <td>${item.status==="yes"?"Да":"Нет"}</td>
        `;
        tbody.appendChild(tr);
    });

    let sel = document.getElementById("row");
    sel.innerHTML="";
    data.forEach((d,i)=>{
        let o=document.createElement("option");
        o.value=i;
        o.textContent=d.subject;
        sel.appendChild(o);
    });
}

function toggleAdmin(){
    let p=document.getElementById("adminPanel");
    p.style.display=p.style.display==="none"?"block":"none";
}

function apply(){
    let i=row.value;
    let old=JSON.stringify(data[i]);

    data[i].subject=subject.value||data[i].subject;
    data[i].condition=condition.value;
    data[i].status=status.value;
    data[i].color=color.value;

    logs.push(`Изменение: ${old} -> ${JSON.stringify(data[i])} | ${new Date().toLocaleString()}`);

    render();
}

async function save(){
    const batch = db.batch();

    const col = await db.collection("table").get();
    col.forEach(doc=>batch.delete(doc.ref));

    data.forEach(item=>{
        let ref = db.collection("table").doc();
        batch.set(ref,item);
    });

    logs.forEach(log=>{
        let ref = db.collection("logs").doc();
        batch.set(ref,{text:log});
    });

    await batch.commit();
    alert("Сохранено в облаке");
}

load();
</script>

</body>
</html>
